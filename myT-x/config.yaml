shell: powershell.exe
prefix: Ctrl+b
quake_mode: true
global_hotkey: Ctrl+Shift+F12
auto_start: []
keys:
  split-vertical: "%"
  split-horizontal: "\""
  toggle-zoom: z
  kill-pane: x
  detach-session: d
worktree:
  enabled: true
  force_cleanup: false
  setup_scripts: []
  setup_script_timeout_seconds: 300
  copy_files: []
  copy_dirs: []
agent_model:
  from: "claude-opus-4-6"
  to: "claude-sonnet-4-5-20250929"
  overrides:
    - name: "security"
      model: "claude-opus-4-6"
    - name: "reviewer"
      model: "claude-sonnet-4-5-20250929"
    - name: "coder"
      model: "claude-sonnet-4-5-20250929"
pane_env:
  CLAUDE_CODE_EFFORT_LEVEL: "high"
pane_env_default_enabled: true
# websocket_port: ターミナル出力WebSocketサーバーのポート番号
# 0 を指定するとOSが自動でポートを割り当てる（推奨）
websocket_port: 0
# default_session_dir: クイックスタートで使用するデフォルト作業ディレクトリ
# 未設定の場合はアプリ起動時のカレントディレクトリが使用されます
# default_session_dir: "C:\\Users\\username\\projects"
# auto_start: ペインツールバーの AutoStart から新規ペインで即時起動するコマンド
# args は配列ではなく command の後ろへそのまま連結される文字列です
# auto_start:
#   - name: "Mini Codex"
#     command: "codex"
#     args: "--model gpt-5.4-mini"
# claude_env: Claude Code専用の環境変数設定
# default_enabled: 新規セッション作成時のチェックボックスのデフォルト値
# vars: Claude Codeプロセスに設定する環境変数のキー・バリューペア
# claude_env:
#   default_enabled: false
#   vars:
#     CLAUDE_CODE_EFFORT_LEVEL: "high"
# viewer_shortcuts: ビューアーパネルのキーボードショートカット設定
# 指定しない場合はデフォルトのショートカットが使用されます
# viewer_shortcuts:
#   file-tree: "Ctrl+Shift+E"
#   git-graph: "Ctrl+Shift+G"
#   error-log: "Ctrl+Shift+L"
#   diff: "Ctrl+Shift+D"
#   input-history: "Ctrl+Shift+H"
# chat_overlay_percentage: チャットパネルのサイズ比率（ターミナル領域に対する%）
# 15-70の範囲で指定可能。デフォルトは40。
# chat_overlay_percentage: 40
# viewer_sidebar_mode: right viewer sidebar layout mode
# overlay = full-screen overlay (default), docked = right-side panel
# viewer_sidebar_mode: overlay
# When task_scheduler is omitted, the backend returns the effective defaults below.
# task_scheduler: タスクスケジューラの設定
# pre_exec_reset_delay_s: /new後の待機時間（秒、0-60、未設定時/不正値時の有効デフォルト: 0）
# pre_exec_idle_timeout_s: アイドル待機タイムアウト（秒、10-600、未設定時/不正値時の有効デフォルト: 30）
# pre_exec_target_mode: 対象ペイン（task_panes / all_panes）
# message_templates: 固定メッセージテンプレート
# task_scheduler:
#   pre_exec_reset_delay_s: 0
#   pre_exec_idle_timeout_s: 30
#   pre_exec_target_mode: task_panes
#   message_templates:
#     - name: "コードレビュー"
#       message: "コードをレビューして問題点を指摘してください"
# mcp_servers: MCP (Model Context Protocol) サーバーの設定
# 各エントリはセッションごとにオン・オフ可能なMCPサーバーを定義します
# mcp_servers:
#   - id: "memory"
#     name: "MCP Memory Server"
#     description: "プロジェクト横断の知識・文脈を長期記憶するメモリサーバー"
#     kind: "memory-server"
#     command: "myT-x.exe"
#     args: ["mcp-memory"]
#     enabled: true
#     usage_sample: "remember this"
